services:
  seq-ui:   # backend
    image: ghcr.io/ozontech/seq-ui:latest
    volumes:
      - ./config.seq-ui.yaml:/seq-ui/config.yaml
    ports:
      - "5555:5555" # Default HTTP port
      - "5556:5556" # Default gRPC port
      - "5557:5557" # Default debug port
    command: --config config.yaml
  seq-ui-fe:   # нужен только для того, чтобы отдать файлы фронта браузеру при первом запросе
    image: ghcr.io/ozontech/seq-ui-fe:latest
    ports:
      - "5173:80"
    volumes:
      - ./seq-ui-fe-config.json:/usr/share/nginx/html/config.json
  seq-db-proxy:  # proxy для базы данных (принимает запросы от бэка и взаимодействует с базой данных seq-db-store)
    image: ghcr.io/ozontech/seq-db:latest
    volumes:
      - "./config.seq-db.yaml:/seq-db/config.yaml"
      - "./mappings.yaml:/seq-db/mappings.yaml"
    ports:
      - "9002:9002" # Default HTTP port
      - "9004:9004" # Default gRPC port
      - "9200:9200" # Default debug port
    command: --mode proxy --config=config.yaml
    depends_on:
      - seq-db-store

  seq-db-store:  # база данных для хранения логов (по умолчанию кидает логи в папку data)
    image: ghcr.io/ozontech/seq-db:latest
    volumes:
      - "./config.seq-db.yaml:/seq-db/config.yaml"
      - "./data/:/seq-db/data/"
      - "./mappings.yaml:/seq-db/mappings.yaml"
    command: --mode store --config=config.yaml